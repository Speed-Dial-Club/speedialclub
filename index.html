<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Speed Dial Club</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100dvh;
display:flex;
justify-content:center;
align-items:center;
background:#D60B2A;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Helvetica,Arial,sans-serif;
color:white;
overflow:hidden;
}

/* glow */

body::before{
content:"";
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle, rgba(255,255,255,0.18), transparent 65%);
filter:blur(120px);
animation:glowMove 8s ease-in-out infinite alternate;
}

@keyframes glowMove{
0%{transform:translate(-150px,-80px);}
100%{transform:translate(150px,80px);}
}

.container{
position:relative;
text-align:center;
z-index:2;
max-width:600px;
margin:auto;
}

.logo{
width:clamp(225px,40vw,280px);
height:auto;
display:block;
margin:0 auto 40px auto;
}

.text{
font-size: clamp(34px, 7vw, 60px);
font-weight:600;
letter-spacing:-0.02em;
text-shadow:0 0 20px rgba(255,255,255,0.3);
white-space:nowrap;
}

.cursor{
display:inline-block;
width:4px;
height:clamp(34px,7vw,60px);
background:white;
margin-left:6px;
animation:blink 1.2s infinite;
vertical-align:bottom;
}

@keyframes blink{
0%,50%,100%{opacity:1;}
25%,75%{opacity:0;}
}

.footer{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
font-size:12px;
color:rgba(255,255,255,0.8);
letter-spacing:0.05em;
}

/* hamburger */

.menu-btn{
position:absolute;
top:20px;
left:20px;
width:28px;
height:22px;
display:flex;
flex-direction:column;
justify-content:space-between;
background:none;
border:none;
cursor:pointer;
z-index:20;
}

.menu-btn span{
display:block;
height:3px;
background:white;
border-radius:2px;
transition:0.3s;
}

.menu-btn.active span:nth-child(1){
transform:translateY(9px) rotate(45deg);
}

.menu-btn.active span:nth-child(2){
opacity:0;
}

.menu-btn.active span:nth-child(3){
transform:translateY(-9px) rotate(-45deg);
}

/* overlay */

.menu-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(6px);
opacity:0;
pointer-events:none;
transition:0.35s;
z-index:8;
}

.menu-overlay.open{
opacity:1;
pointer-events:auto;
}

/* contact panel */

.contact-panel{
position:fixed;
top:0;
left:-100%;
width:85%;
max-width:420px;
height:100%;
background:#D60B2A;
padding:40px 30px;
transition:left 0.35s ease;
z-index:10;
display:flex;
flex-direction:column;
}

.contact-panel.open{
left:0;
}

.contact-header{
margin-bottom:40px;
}

.contact-logo{
width:200px;
align-self:center;
margin-bottom:60px;
}

/* contact links */

.contact-links{
display:flex;
flex-direction:column;
gap:28px;
font-size:18px;
}

.contact-links a{
display:flex;
align-items:center;
gap:12px;
color:white;
text-decoration:none;
}

.icon{
width:22px;
height:22px;
object-fit:contain;
}

</style>

</head>

<body>

<button class="menu-btn" onclick="toggleMenu()">
<span></span>
<span></span>
<span></span>
</button>

<div class="container">

<img src="SDC Logo.png" class="logo">

<div>
<span class="text" id="text"></span>
<span class="cursor"></span>
</div>

</div>

<div class="footer">
© 2026 Speed Dial Club
</div>

<div class="contact-panel" id="contactPanel">

<div class="contact-header"></div>

<img src="SDC Logo.png" class="contact-logo">

<div class="contact-links">

<a href="https://www.instagram.com/speedialclub" target="_blank">
<img src="instagram.png" class="icon">
Speed Dial Club
</a>

<a href="mailto:contact@speedialclub.in">
<img src="email.png" class="icon">
contact@speedialclub.in
</a>

<a href="tel:+917899497320">
<img src="phone.png" class="icon">
+91 78994 97320
</a>

</div>

</div>

<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>

<script>

const message = "Dialing Soon.....";

const typingSpeed = 90;
const deletingSpeed = 50;

const pauseAfterTyping = 1000;
const pauseAfterDeleting = 1000;

let i = 0;
let isDeleting = false;

const target = document.getElementById("text");

function typeLoop(){

if(!isDeleting){
target.textContent = message.substring(0, i+1);
i++;

if(i === message.length){
isDeleting = true;
setTimeout(typeLoop, pauseAfterTyping);
return;
}

}else{

target.textContent = message.substring(0, i-1);
i--;

if(i === 0){
isDeleting = false;
setTimeout(typeLoop, pauseAfterDeleting);
return;
}

}

let speed = isDeleting ? deletingSpeed : typingSpeed;
setTimeout(typeLoop, speed);

}

setTimeout(typeLoop, 700);

/* menu toggle */

function toggleMenu(){

const panel = document.getElementById("contactPanel");
const overlay = document.getElementById("menuOverlay");
const btn = document.querySelector(".menu-btn");

panel.classList.toggle("open");
overlay.classList.toggle("open");
btn.classList.toggle("active");

}

</script>

</body>
</html>
